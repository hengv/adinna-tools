<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英尺英寸转换器 🐱</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 24px; }
.card { background: white; border-radius: 20px; padding: 40px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
.subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 15px; }
.row { display: flex; gap: 12px; }
.row .field { flex: 1; }
.field label { display: block; color: #888; font-size: 13px; margin-bottom: 4px; }
input[type="number"] { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 18px; transition: border-color 0.3s; outline: none; }
input[type="number"]:focus { border-color: #667eea; }
.result-box { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 14px; padding: 24px; margin-top: 24px; }
.result-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
.result-item:not(:last-child) { border-bottom: 1px solid rgba(0,0,0,0.08); }
.result-label { color: #555; font-size: 14px; }
.result-value { color: #333; font-size: 20px; font-weight: 700; }
.result-value .unit { font-size: 14px; font-weight: 400; color: #888; }
.emoji { font-size: 28px; text-align: center; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">📐</div>
  <h1>英尺英寸 → 米 转换器</h1>
  <p class="subtitle">输入长和宽，自动计算米数和面积</p>

  <div class="input-group">
    <label>📏 长度（第一个尺寸）</label>
    <div class="row">
      <div class="field">
        <label>英尺</label>
        <input type="number" id="ft1" placeholder="0" min="0" oninput="calc()">
      </div>
      <div class="field">
        <label>英寸</label>
        <input type="number" id="in1" placeholder="0" min="0" max="11" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="input-group">
    <label>📏 宽度（第二个尺寸）</label>
    <div class="row">
      <div class="field">
        <label>英尺</label>
        <input type="number" id="ft2" placeholder="0" min="0" oninput="calc()">
      </div>
      <div class="field">
        <label>英寸</label>
        <input type="number" id="in2" placeholder="0" min="0" max="11" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="result-box">
    <div class="result-item">
      <span class="result-label">长度</span>
      <span class="result-value" id="r1">0 <span class="unit">米</span></span>
    </div>
    <div class="result-item">
      <span class="result-label">宽度</span>
      <span class="result-value" id="r2">0 <span class="unit">米</span></span>
    </div>
    <div class="result-item">
      <span class="result-label">面积</span>
      <span class="result-value" id="r3">0 <span class="unit">平方米</span></span>
    </div>
    <div class="result-item">
      <span class="result-label">面积</span>
      <span class="result-value" id="r4">0 <span class="unit">平方英尺</span></span>
    </div>
  </div>
</div>

<div class="card">
  <div class="emoji">🔄</div>
  <h1>平方英尺 → 平方米</h1>
  <p class="subtitle">直接输入面积，快速转换</p>

  <div class="input-group">
    <label>📐 面积</label>
    <div class="field">
      <label>平方英尺 (sqft)</label>
      <input type="number" id="sqftIn" placeholder="例如 1200" min="0" oninput="calcSqft()">
    </div>
  </div>

  <div class="result-box">
    <div class="result-item">
      <span class="result-label">平方米</span>
      <span class="result-value" id="sqmOut">0 <span class="unit">㎡</span></span>
    </div>
    <div class="result-item">
      <span class="result-label">约等于</span>
      <span class="result-value" id="pingOut">0 <span class="unit">坪</span></span>
    </div>
  </div>
</div>

<script>
function calc() {
  const ft1 = parseFloat(document.getElementById('ft1').value) || 0;
  const in1 = parseFloat(document.getElementById('in1').value) || 0;
  const ft2 = parseFloat(document.getElementById('ft2').value) || 0;
  const in2 = parseFloat(document.getElementById('in2').value) || 0;

  const m1 = (ft1 * 0.3048) + (in1 * 0.0254);
  const m2 = (ft2 * 0.3048) + (in2 * 0.0254);
  const sqm = m1 * m2;
  const totalIn1 = ft1 * 12 + in1;
  const totalIn2 = ft2 * 12 + in2;
  const sqft = (totalIn1 * totalIn2) / 144;

  document.getElementById('r1').innerHTML = m1.toFixed(2) + ' <span class="unit">米</span>';
  document.getElementById('r2').innerHTML = m2.toFixed(2) + ' <span class="unit">米</span>';
  document.getElementById('r3').innerHTML = sqm.toFixed(2) + ' <span class="unit">平方米</span>';
  document.getElementById('r4').innerHTML = sqft.toFixed(2) + ' <span class="unit">平方英尺</span>';
}

function calcSqft() {
  const sqft = parseFloat(document.getElementById('sqftIn').value) || 0;
  const sqm = sqft * 0.092903;
  const ping = sqm / 3.30579;
  document.getElementById('sqmOut').innerHTML = sqm.toFixed(2) + ' <span class="unit">㎡</span>';
  document.getElementById('pingOut').innerHTML = ping.toFixed(2) + ' <span class="unit">坪</span>';
}
</script>
</body>
</html>
